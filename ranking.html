<!DOCTYPE html>
<html lang="es">

<head>

    <title>Ranking | Rally de Conocimientos</title>

    <link rel="stylesheet" href="CSS/style.css?v=20260601-02">
</head>

<body>

    <header class="header">
        <img src="IMG/isc.jpg" class="logo-small" alt="ISC">

        <h1>Rally de Conocimientos</h1>
        <p>Ranking en tiempo real</p>
    </header>

    <main class="dashboard">

        <section class="ranking">
            <div id="tabla-ranking"></div>

            <div class="info-box">

                <p id="fecha"></p>

                <h3>Hora actual</h3>
                <p id="hora"></p>

                <h3>Última actualización</h3>
                <p id="actualizacion"></p>
            </div>
        </aside>

    </main>

    <div class="reloj-inferior" id="relojInferior"></div>

    <script src="JS/ranking.js?v=20260609-109"></script>
    <script src="JS/control.js?v=6"></script>
